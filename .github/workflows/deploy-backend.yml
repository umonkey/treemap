# This workflow builds and deploys the app to our server.
# It builds a combined image (backend + frontend) and pushes
# that as ghcr.io/umonkey/treemap:latest
#
# The workflow uses some caching to speed up Docker builds.

name: Deploy Backend

on:
  push:
    branches:
      - master
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'Dockerfile'
  pull_request:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'Dockerfile'
  workflow_dispatch:

env:
  SSH_KEY: ${{ secrets.SSH_KEY }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/master' }}
          tags: ghcr.io/umonkey/treemap:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to cloud.treemaps.app
        if: github.ref == 'refs/heads/master'
        uses: appleboy/ssh-action@v1.2.0
        env:
          CR_USER: ${{ github.actor }}
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: cloud.treemaps.app
          username: app
          key: ${{ secrets.SSH_KEY }}
          envs: CR_USER,CR_TOKEN
          script: ./update-deployment.sh
