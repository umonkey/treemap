# This workflow builds and deploys the Caddy reverse proxy.
# We need a custom build to use Cloudflare for DNS challenge.
#
# The image is built and pushed as: ghcr.io/umonkey/treemap-caddy:latest

name: Deploy Caddy

on:
  push:
    branches:
      - master
    paths:
      - 'services/caddy/**'
  pull_request:
    paths:
      - 'services/caddy/**'
  workflow_dispatch:

env:
  SSH_KEY: ${{ secrets.SSH_KEY }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/caddy

    steps:
      - uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: services/caddy
          push: ${{ github.ref == 'refs/heads/master' }}
          tags: ghcr.io/umonkey/treemap-caddy:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to cloud.treemaps.app
        if: github.ref == 'refs/heads/master'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: cloud.treemaps.app
          username: app
          key: ${{ secrets.SSH_KEY }}
          script: ./update-deployment.sh
