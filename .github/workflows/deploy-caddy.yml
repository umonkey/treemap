# This workflow builds and deploys the Caddy reverse proxy.
# We need a custom build to use Cloudflare for DNS challenge.
#
# The image is built and pushed as: ghcr.io/umonkey/treemap-caddy:latest

name: Deploy Caddy

on:
  push:
    branches:
      - master
    paths:
      - 'services/caddy/**'
  pull_request:
    paths:
      - 'services/caddy/**'
  workflow_dispatch:

env:
  SSH_KEY: ${{ secrets.SSH_KEY }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/caddy
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: services/caddy
          push: ${{ github.ref == 'refs/heads/master' }}
          tags: ghcr.io/umonkey/treemap-caddy:latest
          cache-from: |
            type=gha,scope=caddy
            ghcr.io/umonkey/treemap-caddy:latest
          cache-to: type=gha,mode=max,scope=caddy

      - name: Deploy to cloud.treemaps.app
        if: github.ref == 'refs/heads/master'
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H cloud.treemaps.app >> ~/.ssh/known_hosts
          eval $(ssh-agent -s)
          echo "$SSH_KEY" | tr -d '\r' | ssh-add -
          ssh app@cloud.treemaps.app "CR_USER='${{ github.actor }}' CR_TOKEN='${{ secrets.GITHUB_TOKEN }}' ./treemap/update-deployment.sh"
